<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Pokemonshell Shop</title>
<style>
  body {
    font-family: Arial;
    margin: 0;
    background: #f5f5f5;
  }
  .header {
    background: #ff5555;
    color: white;
    padding: 15px;
    text-align: center;
    font-size: 24px;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .search-box {
    padding: 15px;
    text-align: center;
    background: white;
    position: sticky;
    top: 56px;
    z-index: 9;
  }
  .search-box input {
    width: 90%;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #ccc;
    font-size: 16px;
  }
  .container {
    display: flex;
    flex-wrap: wrap;
  }
  #pokemon-container {
    flex: 3;
    padding: 20px;
    max-height: 75vh;
    overflow-y: auto;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
  }
  .pokemon-card {
    background: white;
    border-radius: 15px;
    padding: 10px;
    margin: 10px;
    width: 160px;
    text-align: center;
    box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    transition: transform 0.3s;
  }
  .pokemon-card:hover {
    transform: scale(1.05);
    box-shadow: 0 8px 16px rgba(0,0,0,0.2);
  }
  .pokemon-card img {
    width: 120px;
    height: 120px;
    object-fit: contain;
  }
  button {
    background: #ff5555;
    color: white;
    border: none;
    padding: 8px;
    width: 100%;
    border-radius: 8px;
    cursor: pointer;
  }
  .cart {
    flex: 1;
    background: white;
    padding: 20px;
    border-left: 2px solid #eee;
    max-height: 75vh;
    overflow-y: auto;
    min-width: 280px;
  }
  .checkout {
    background: green;
    margin-top: 10px;
  }
  #cart-items div {
    margin-bottom: 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  #cart-items button {
    background: #ff5555;
    border: none;
    padding: 3px 7px;
    border-radius: 5px;
    cursor: pointer;
    font-size: 14px;
  }
  /* WhatsApp floating button */
  #whatsapp-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #25D366;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    cursor: pointer;
    z-index: 100;
    display: flex;
    justify-content: center;
    align-items: center;
  }
  #whatsapp-btn img {
    width: 35px;
    height: 35px;
  }
  @media (max-width: 800px) {
    .container {
      flex-direction: column;
    }
    #pokemon-container, .cart {
      max-height: none;
      width: 100%;
      border-left: none;
      padding: 10px;
      min-width: auto;
    }
  }
</style>
</head>
<body>

<div class="header">🛒 Pokemonshell Shop</div>

<div class="search-box">
  <input
    type="text"
    id="search"
    placeholder="🔍 ค้นหา Pokémon..."
    onkeyup="searchPokemon()"
    autocomplete="off"
  />
</div>

<div class="container">
  <div id="pokemon-container">กำลังโหลด Pokémon...</div>

  <div class="cart">
    <h2>ตะกร้า</h2>
    <div id="cart-items"></div>
    <h3 id="total">รวม: 0 บาท</h3>
    <button class="checkout" onclick="checkout()">Checkout</button>
  </div>
</div>

<!-- WhatsApp floating button -->
<a
  href="https://api.whatsapp.com/send/?phone=660828150927&text=%E0%B8%AA%E0%B9%88%E0%B8%87%E0%B8%A3%E0%B8%B9%E0%B8%9B%E0%B8%9E%E0%B8%A3%E0%B9%89%E0%B8%AD%E0%B8%A1%E0%B8%AA%E0%B8%A5%E0%B8%B4%E0%B8%9B%E0%B9%82%E0%B8%AD%E0%B8%99%E0%B9%80%E0%B8%87%E0%B8%B4%E0%B8%99"
  target="_blank"
  id="whatsapp-btn"
  title="ติดต่อผ่าน WhatsApp"
>
  <img src="whatsapp.png" alt="WhatsApp" />
</a>

<script>
  const container = document.getElementById("pokemon-container");
  const cartItems = document.getElementById("cart-items");
  const totalEl = document.getElementById("total");
  const searchInput = document.getElementById("search");

  let cart = JSON.parse(localStorage.getItem("cart")) || [];
  let allPokemons = [];
  let filteredPokemons = [];
  let loadedCount = 0;
  const loadStep = 50;
  const maxLoad = 1000;

  function getPrice(id) {
    return id * 5 + Math.floor(Math.random() * 100);
  }
  function getImage(id) {
    return `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${id}.png`;
  }
  function capitalize(s) {
    return s.charAt(0).toUpperCase() + s.slice(1);
  }

  async function loadPokemons() {
    try {
      const res = await fetch(`https://pokeapi.co/api/v2/pokemon?limit=${maxLoad}`);
      const data = await res.json();

      allPokemons = data.results.map((p, i) => ({
        name: capitalize(p.name),
        id: i + 1,
        price: getPrice(i + 1),
        image: getImage(i + 1),
      }));

      filteredPokemons = allPokemons;
      loadedCount = 0;
      container.innerHTML = "";
      loadMorePokemons();
    } catch (err) {
      container.innerHTML = "เกิดข้อผิดพลาดในการโหลด Pokémon";
      console.error(err);
    }
  }

  function loadMorePokemons() {
    const nextPokemons = filteredPokemons.slice(loadedCount, loadedCount + loadStep);
    nextPokemons.forEach(pokemon => {
      const card = document.createElement("div");
      card.className = "pokemon-card";
      card.innerHTML = `
        <h3>${pokemon.name}</h3>
        <img
          src="${pokemon.image}"
          alt="${pokemon.name}"
          onerror="this.onerror=null;this.src='https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${pokemon.id}.png';"
        />
        <p>💰 ราคา: ${pokemon.price} บาท</p>
        <button onclick="addToCart('${pokemon.name}', ${pokemon.price}, ${pokemon.id}, '${pokemon.image}')">ซื้อ</button>
      `;
      container.appendChild(card);
    });
    loadedCount += loadStep;
  }

  container.addEventListener("scroll", () => {
    if (container.scrollTop + container.clientHeight >= container.scrollHeight - 10) {
      if (loadedCount < filteredPokemons.length) {
        loadMorePokemons();
      }
    }
  });

  function renderPokemons(list) {
    container.innerHTML = "";
    loadedCount = 0;
    filteredPokemons = list;
    loadMorePokemons();
  }

  function searchPokemon() {
    const keyword = searchInput.value.toLowerCase();
    const filtered = allPokemons.filter(p => p.name.toLowerCase().includes(keyword));
    renderPokemons(filtered);
  }

  function saveCart() {
    localStorage.setItem("cart", JSON.stringify(cart));
  }

  function addToCart(name, price, id, image) {
    const index = cart.findIndex(item => item.id === id);
    if (index > -1) {
      cart[index].quantity++;
    } else {
      cart.push({ name, price, id, quantity: 1, image });
    }
    saveCart();
    renderCart();
  }

  function removeFromCart(id) {
    const index = cart.findIndex(item => item.id === id);
    if (index > -1) {
      cart.splice(index, 1);
      saveCart();
      renderCart();
    }
  }

  function updateQuantity(id, delta) {
    const index = cart.findIndex(item => item.id === id);
    if (index > -1) {
      cart[index].quantity += delta;
      if (cart[index].quantity <= 0) {
        removeFromCart(id);
      } else {
        saveCart();
        renderCart();
      }
    }
  }

  function renderCart() {
    cartItems.innerHTML = "";
    if (cart.length === 0) {
      cartItems.innerHTML = "<p>ตะกร้าว่าง</p>";
      totalEl.innerText = "รวม: 0 บาท";
      return;
    }
    let total = 0;
    cart.forEach(item => {
      total += item.price * item.quantity;
      const div = document.createElement("div");
      div.innerHTML = `
        <span>${item.name} x${item.quantity} = ${item.price * item.quantity} บาท</span>
        <div>
          <button onclick="updateQuantity(${item.id}, -1)">-</button>
          <button onclick="updateQuantity(${item.id}, 1)">+</button>
          <button onclick="removeFromCart(${item.id})">ลบ</button>
        </div>
      `;
      cartItems.appendChild(div);
    });
    totalEl.innerText = `รวม: ${total} บาท`;
  }

  function checkout() {
    if (cart.length === 0) {
      alert("ตะกร้าว่าง!");
      return;
    }
    localStorage.setItem("cartForReceipt", JSON.stringify(cart));
    window.location.href = "receipt.html";
  }

  // เริ่มโหลด
  loadPokemons();
  renderCart();
</script>
</body>
</html>
