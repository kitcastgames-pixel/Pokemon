<!DOCTYPE html>
<html>
<head>
    <title>Pokemonshell</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        h1 { color: #ff5555; }
        .pokemon-card { display: inline-block; border: 1px solid #ccc; padding: 10px; margin: 10px; text-align: center; width: 200px; }
        .pokemon-card img { width: 150px; }
        select, input { width: 100%; padding: 5px; margin-top: 5px; }
        button { background-color: #ff5555; color: white; padding: 10px; border: none; cursor: pointer; margin-top: 10px; width: 100%; }
        button:hover { background-color: #ff0000; }
    </style>
</head>
<body>
    <h1>ร้าน Pokemonshell</h1>

    <div id="pokemon-container"></div>

    <script src="js/main.js"></script>
</body>
</html>
