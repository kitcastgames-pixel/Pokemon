<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pokemonshell Shop</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #f5f5f5;
}

/* HEADER */
.header {
    background: #ff5555;
    color: white;
    padding: 15px;
    text-align: center;
    font-size: 24px;
}

/* SEARCH */
.search-box {
    padding: 15px;
    text-align: center;
    background: white;
}

.search-box input {
    width: 90%;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #ccc;
    font-size: 16px;
}

/* LAYOUT */
.container {
    display: flex;
}

/* POKEMON LIST */
#pokemon-container {
    flex: 3;
    padding: 20px;
}

/* CARD */
.pokemon-card {
    display: inline-block;
    background: white;
    border-radius: 15px;
    padding: 10px;
    margin: 10px;
    width: 160px;
    text-align: center;
    box-shadow: 0 4px 8px rgba(0,0,0,0.1);
}

.pokemon-card img {
    width: 100px;
    height: 100px;
    object-fit: contain;
    transition: transform 0.3s;
}

.pokemon-card:hover img {
    transform: scale(1.2);
}

/* BUTTON */
button {
    background: #ff5555;
    color: white;
    border: none;
    padding: 8px;
    width: 100%;
    border-radius: 8px;
    cursor: pointer;
}

/* CART */
.cart {
    flex: 1;
    background: white;
    padding: 20px;
    border-left: 2px solid #eee;
}

.checkout {
    background: green;
    margin-top: 10px;
}
</style>
</head>

<body>

<div class="header">🛒 Pokemonshell Shop</div>

<!-- 🔍 SEARCH -->
<div class="search-box">
    <input 
        type="text" 
        id="search" 
        placeholder="🔍 ค้นหา Pokémon..."
        onkeyup="searchPokemon()"
    >
</div>

<!-- 🖼️ LIST ด้านล่าง -->
<div class="container">

    <div id="pokemon-container"></div>

    <div class="cart">
        <h2>ตะกร้า</h2>
        <div id="cart-items"></div>
        <h3 id="total">รวม: 0 บาท</h3>
        <button class="checkout" onclick="checkout()">Checkout</button>
    </div>

</div>

<script src="js/main.js"></script>
</body>
</html>
