<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>ใบเสร็จ</title>
</head>

<body>

<h1>🧾 ใบเสร็จ</h1>
<div id="receipt"></div>

<script>
const receiptDiv = document.getElementById("receipt");
const cart = JSON.parse(localStorage.getItem("cart")) || [];

let total = 0;

cart.forEach(item => {
    total += item.price;
    const p = document.createElement("p");
    p.innerText = `${item.name} - ${item.price} บาท`;
    receiptDiv.appendChild(p);
});

const totalEl = document.createElement("h2");
totalEl.innerText = `รวมทั้งหมด: ${total} บาท`;
receiptDiv.appendChild(totalEl);
</script>

</body>
</html>
