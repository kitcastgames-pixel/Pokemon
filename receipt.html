<!DOCTYPE html>
<html>
<head>
    <title>ใบเสร็จ Pokemonshell</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        h1, h2 { color: #ff5555; }
        p { font-size: 18px; }
        img { width: 150px; }
        a { color: #ff5555; text-decoration: none; font-weight: bold; }
        a:hover { text-decoration: underline; }
        .qr { width: 200px; margin-top: 20px; }
        .contact { text-align: center; margin-top: 20px; }
        .whatsapp-img { width: 100px; }
    </style>
</head>
<body>
    <h1>สรุปคำสั่งซื้อ</h1>

    <div id="receipt-container"></div>

    <script>
    const params = new URLSearchParams(window.location.search);
    const name = params.get("name");
    const hp = params.get("hp");
    const damage = params.get("damage");
    const quantity = params.get("quantity");
    const move = params.get("move");
    const total = params.get("total");
    const image = params.get("image");

    const container = document.getElementById("receipt-container");
    container.innerHTML = `
        <img src="images/${image}" alt="${name}">
        <p>โปเกมอน: ${name}</p>
        <p>HP: ${hp}</p>
        <p>Damage: ${damage}</p>
        <p>จำนวน: ${quantity}</p>
        <p>ท่าโจมตี: ${move}</p>
        <p>ราคารวม: ${total} บาท</p>

        <h2>สแกน QR Code เพื่อชำระเงิน</h2>
        <img src="images/pay_qr.png" class="qr">

        <div class="contact">
            <h2>ติดต่อสอบถามเพิ่มเติม</h2>
            <a href="https://api.whatsapp.com/send/?phone=660828150927&text=สนใจสินค้า" target="_blank">
                <img src="images/whatsapp.png" class="whatsapp-img">
                <p>คลิกเพื่อแชทผ่าน WhatsApp</p>
            </a>
        </div>

        <a href="index.html">กลับไปซื้อเพิ่ม</a>
    `;
    </script>
</body>
</html>
